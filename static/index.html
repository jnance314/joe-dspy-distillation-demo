<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSPy Prompt Optimizer</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/static/app.js"></script>
</head>
<body>
<div class="container" x-data="app">

  <!-- Header -->
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>DSPy Prompt Optimizer</h1>
    <a href="/docs-page" class="btn" style="text-decoration:none;">Docs</a>
  </div>
  <p class="subtitle">Optimize prompts automatically. Deploy cheap models that perform like expensive ones.</p>

  <!-- Task Selector -->
  <div class="card">
    <h2 style="margin-bottom:8px;">Select Task</h2>
    <div class="mode-toggle" style="flex-wrap:wrap;">
      <template x-for="t in savedTasks" :key="t">
        <button class="btn" :class="{ active: selectedTask === t }"
          @click="loadTask(t)" x-text="t.replace(/_/g, ' ')">
        </button>
      </template>
    </div>
  </div>

  <!-- Task Configuration -->
  <div class="card">
    <h2>Task Configuration</h2>


    <div class="form-row">
      <div class="form-group">
        <label>Task Name</label>
        <input type="text" x-model="task.name" placeholder="e.g., Brand Voice Compliance">
      </div>
      <div class="form-group">
        <label>Description (becomes prompt preamble)</label>
        <input type="text" x-model="task.description" placeholder="e.g., Check if copy matches brand guidelines...">
      </div>
    </div>

    <div class="form-group">
      <label>Guidelines / Context</label>
      <textarea rows="6" x-model="task.guidelines" placeholder="Paste your brand guidelines, rules, context..."></textarea>
    </div>

    <!-- Signature Fields -->
    <h2 style="margin-top:16px;">Signature Fields</h2>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <!-- Input fields -->
      <div>
        <label>Input Fields</label>
        <div class="fields-list">
          <template x-for="(f, idx) in task.fields.filter(f => f.field_type === 'input')" :key="idx">
            <div class="field-row">
              <input type="text" x-model="f.name" placeholder="field name">
              <input type="text" x-model="f.description" placeholder="description">
              <button class="btn btn-sm btn-danger" @click="removeField(task.fields.indexOf(f))">&times;</button>
            </div>
          </template>
          <button class="btn btn-sm" @click="addField('input')">+ Add Input</button>
        </div>
      </div>
      <!-- Output fields -->
      <div>
        <label>Output Fields</label>
        <div class="fields-list">
          <template x-for="(f, idx) in task.fields.filter(f => f.field_type === 'output')" :key="idx">
            <div class="field-row">
              <input type="text" x-model="f.name" placeholder="field name">
              <input type="text" x-model="f.description" placeholder="description">
              <button class="btn btn-sm btn-danger" @click="removeField(task.fields.indexOf(f))">&times;</button>
            </div>
          </template>
          <button class="btn btn-sm" @click="addField('output')">+ Add Output</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Metrics -->
  <div class="card">
    <h2>Evaluation Metrics</h2>

    <template x-for="(m, idx) in task.metrics" :key="m.name + idx">
      <div style="margin-bottom:12px; padding:12px; background:var(--surface2); border-radius:var(--radius);">
        <div class="metric-row">
          <input type="text" x-model="m.name" placeholder="metric name">
          <select x-model="m.metric_type">
            <option value="exact_match">Exact Match</option>
            <option value="f1_phrases">F1 Phrases</option>
            <option value="rule_quality">Rule Quality</option>
            <option value="custom">Custom (Python)</option>
          </select>
          <select x-model="m.target_field">
            <template x-for="f in outputFields" :key="f.name">
              <option :value="f.name" x-text="f.name" :selected="f.name === m.target_field"></option>
            </template>
          </select>
          <div>
            <input type="range" min="0" max="1" step="0.05" x-model.number="m.weight" style="width:70px;">
            <span class="weight-display" x-text="m.weight.toFixed(2)"></span>
          </div>
          <button class="btn btn-sm btn-danger" @click="removeMetric(idx)">&times;</button>
        </div>

        <!-- Rule quality config -->
        <template x-if="m.metric_type === 'rule_quality'">
          <div class="rule-config">
            <div class="form-group">
              <label style="text-transform:none;">Banned Words (one per line)</label>
              <textarea rows="3"
                :value="(m.rule_config.banned_words || []).join('\n')"
                @input="m.rule_config.banned_words = $event.target.value.split('\n').filter(w => w.trim())"
                placeholder="premium quality&#10;best-in-class&#10;innovative solution"></textarea>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" :checked="m.rule_config.no_passive_voice"
                @change="m.rule_config.no_passive_voice = $event.target.checked">
              <label>No passive voice</label>
            </div>
            <div class="form-group">
              <label style="text-transform:none;">Max sentence length (words, 0 = disabled)</label>
              <input type="number" :value="m.rule_config.max_sentence_length || 0"
                @input="m.rule_config.max_sentence_length = parseInt($event.target.value) || 0"
                style="width:100px;">
            </div>
          </div>
        </template>

        <!-- Custom code -->
        <template x-if="m.metric_type === 'custom'">
          <div class="rule-config">
            <label style="text-transform:none;">Python metric function</label>
            <textarea rows="6" x-model="m.custom_code"
              placeholder="def metric(example, pred, trace=None):&#10;    expected = str(example.field_name).strip()&#10;    predicted = str(pred.field_name).strip()&#10;    return 1.0 if expected == predicted else 0.0"></textarea>
          </div>
        </template>
      </div>
    </template>
    <button class="btn btn-sm" @click="addMetric()">+ Add Metric</button>
  </div>

  <!-- Training Data -->
  <div class="card">
    <div class="card-header">
      <h2 style="margin:0;">Training Data</h2>
      <div class="btn-group">
        <button class="btn btn-sm" @click="addExample()">+ Add Row</button>
        <button class="btn btn-sm" @click="importCSV()">Import CSV</button>
      </div>
    </div>


    <div class="examples-wrap">
      <table class="examples-table">
        <thead>
          <tr>
            <th style="width:30px;">#</th>
            <template x-for="f in task.fields">
              <th x-text="f.name"></th>
            </template>
            <th style="width:40px;"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(ex, idx) in task.examples" :key="idx">
            <tr>
              <td style="color:var(--text-dim);" x-text="idx + 1"></td>
              <template x-for="f in task.fields">
                <td>
                  <textarea x-model="ex[f.name]"                    rows="1" style="min-height:32px;"></textarea>
                </td>
              </template>
              <td>
                <button class="btn btn-sm btn-danger" @click="removeExample(idx)"
>&times;</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div class="example-count" x-text="exampleSplitInfo"></div>
  </div>

  <!-- Model Configuration -->
  <div class="card">
    <h2>Model Configuration</h2>

    <div class="form-row">
      <div class="form-group">
        <label>Teacher Model (expensive, used for optimization)</label>
        <select x-model="teacherModel">
          <template x-for="m in availableModels.teacher" :key="m.id">
            <option :value="m.id" x-text="`${m.name} (${m.provider}) - $${m.input_cost}/$${m.output_cost} per 1M`"
              :selected="m.id === teacherModel"></option>
          </template>
        </select>
      </div>
      <div class="form-row" style="margin:0;">
        <div class="form-group">
          <label>Eval Trials</label>
          <input type="number" x-model.number="evalTrials" min="1" max="100">
        </div>
        <div class="form-group">
          <label>Threads</label>
          <input type="number" x-model.number="threads" min="1" max="100">
        </div>
      </div>
    </div>

    <label>Student Models (cheap, deployed in production)</label>
    <template x-for="(m, idx) in studentModels" :key="idx">
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <select x-model="studentModels[idx]" style="flex:1;">
          <template x-for="sm in availableModels.student" :key="sm.id">
            <option :value="sm.id" x-text="`${sm.name} (${sm.provider}) - $${sm.input_cost}/$${sm.output_cost} per 1M`"
              :selected="sm.id === studentModels[idx]"></option>
          </template>
        </select>
        <button class="btn btn-sm btn-danger" @click="removeStudentModel(idx)"
          :disabled="studentModels.length <= 1">&times;</button>
      </div>
    </template>
    <button class="btn btn-sm" @click="addStudentModel()">+ Add Student Model</button>
  </div>

  <!-- Run Button -->
  <div style="text-align:center; margin:24px 0;">
    <button class="btn btn-primary" style="padding:12px 48px; font-size:1rem;"
      @click="startRun()"
      :disabled="jobStatus && (jobStatus.status === 'pending' || jobStatus.status === 'running')">
      Run Optimization
    </button>
  </div>

  <!-- Error -->
  <template x-if="error">
    <div class="card" style="border-color:var(--danger);">
      <h2 style="color:var(--danger);">Error</h2>
      <p style="font-family:var(--mono); font-size:0.85rem;" x-text="error"></p>
    </div>
  </template>

  <!-- Progress -->
  <template x-if="jobStatus && (jobStatus.status === 'pending' || jobStatus.status === 'running')">
    <div class="card">
      <h2>Optimization in Progress</h2>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="progress-step" x-text="jobStatus.current_step"></span>
        <span class="progress-pct" x-text="jobStatus.progress_pct + '%'"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" :style="'width:' + jobStatus.progress_pct + '%'"></div>
      </div>
    </div>
  </template>

  <!-- Table 1: Original Results -->
  <template x-if="results">
    <div class="card">
      <h2>Table 1: Original Results</h2>
      <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px;">
        Mean of <span x-text="evalTrials"></span> trials at temperature=0 on held-out test set.
      </p>

      <div style="overflow-x:auto;">
        <table class="results-table">
          <thead>
            <tr>
              <th></th>
              <template x-for="col in getResultColumns()">
                <th>
                  <div x-text="col.label"></div>
                  <div style="font-size:0.7rem; opacity:0.7;" x-text="col.model"></div>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="metric in getMetricNames()">
              <tr>
                <td x-text="metric"></td>
                <template x-for="(col, ci) in getResultColumns()">
                  <td :class="{ best: isBest(metric, ci, getResultColumns()) }" x-text="formatScore(col.scores[metric])"></td>
                </template>
              </tr>
            </template>
            <tr>
              <td>latency</td>
              <template x-for="(col, ci) in getResultColumns()">
                <td :class="{ best: isFastestLatency(ci, getResultColumns()) }" x-text="formatLatency(col.latency)"></td>
              </template>
            </tr>
            <tr>
              <td>cost (in/out per 1M)</td>
              <template x-for="(col, ci) in getResultColumns()">
                <td :class="{ best: isCheapest(ci, getResultColumns()) }" x-text="formatCost(col.cost)"></td>
              </template>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- AI Summary -->
      <template x-if="results.summary">
        <div style="margin-top:16px; padding:16px; background:var(--surface2); border-radius:var(--radius); border-left:3px solid var(--accent);">
          <h3 style="margin:0 0 8px; font-size:0.9rem; color:var(--accent);">AI-Generated Analysis</h3>
          <p style="font-size:0.85rem; line-height:1.7; white-space:pre-wrap;" x-text="results.summary"></p>
        </div>
      </template>
    </div>
  </template>

  <!-- Edit & Re-evaluate -->
  <template x-if="results">
    <div class="card">
      <h2>Edit & Re-evaluate</h2>
      <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px;">
        Edit any column's prompt below, then re-evaluate to see if your changes help or hurt.
        Table 2 will show the results of your edits alongside the originals.
      </p>

      <!-- Tabs -->
      <div class="mode-toggle" style="flex-wrap:wrap; margin-bottom:12px;">
        <template x-for="key in getEditTabKeys()" :key="key">
          <button class="btn" :class="{ active: activeEditTab === key }"
            @click="activeEditTab = key" x-text="getEditTabLabel(key)"></button>
        </template>
      </div>

      <!-- Tab content -->
      <template x-for="key in getEditTabKeys()" :key="'editor-' + key">
        <div x-show="activeEditTab === key">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label style="margin:0;" x-text="getEditTabLabel(key) + ' Prompt'"></label>
            <button class="btn btn-sm" @click="resetPrompt(key)">Reset to Original</button>
          </div>
          <textarea rows="14"
            style="width:100%; font-family:var(--mono); font-size:0.75rem; line-height:1.5;"
            x-model="editedPrompts[key]"></textarea>
        </div>
      </template>

      <!-- Re-evaluate button -->
      <div style="margin-top:12px; display:flex; gap:12px; align-items:center;">
        <button class="btn btn-primary" @click="evalEdited()" :disabled="editedLoading">
          <span x-text="editedLoading ? 'Re-evaluating...' : 'Re-evaluate All Edits'"></span>
        </button>
        <template x-if="editedResults">
          <span style="font-size:0.8rem; color:var(--success);">Results below (Table 2)</span>
        </template>
      </div>
    </div>
  </template>

  <!-- Table 2: Edited Results -->
  <template x-if="editedResults">
    <div class="card">
      <h2>Table 2: After Edits</h2>
      <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px;">
        Results with your edited prompts. <span style="color:var(--success);">Green</span> = improved vs Table 1,
        <span style="color:var(--danger);">red</span> = degraded.
      </p>

      <div style="overflow-x:auto;">
        <table class="results-table">
          <thead>
            <tr>
              <th></th>
              <template x-for="col in editedResults">
                <th>
                  <div x-text="col.label"></div>
                  <div style="font-size:0.7rem; opacity:0.7;" x-text="col.model"></div>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="metric in getMetricNames()">
              <tr>
                <td x-text="metric"></td>
                <template x-for="(col, ci) in editedResults">
                  <td>
                    <span x-text="formatScore(col.scores[metric])"></span>
                    <span style="font-size:0.7rem; margin-left:4px;"
                      :style="deltaClass(getDelta(col, metric))"
                      x-text="formatDelta(getDelta(col, metric))"></span>
                  </td>
                </template>
              </tr>
            </template>
            <tr>
              <td>latency</td>
              <template x-for="(col, ci) in editedResults">
                <td x-text="formatLatency(col.latency)"></td>
              </template>
            </tr>
            <tr>
              <td>cost (in/out per 1M)</td>
              <template x-for="(col, ci) in editedResults">
                <td x-text="formatCost(col.cost)"></td>
              </template>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Production Prompt Viewers -->
  <template x-if="results">
    <div class="card">
      <h2>Production Prompts</h2>
      <template x-for="(data, modelId) in results.students" :key="'prompt-' + modelId">
        <div style="margin-bottom:16px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h3 style="margin:0; font-size:0.9rem;">
              <span style="color:var(--accent);" x-text="modelId.split('/').pop()"></span>
            </h3>
            <div class="btn-group">
              <button class="btn btn-sm" @click="copyPrompt(modelId)">Copy to Clipboard</button>
              <button class="btn btn-sm" @click="downloadPrompt(modelId)">Download .txt</button>
            </div>
          </div>
          <textarea readonly
            style="width:100%; min-height:150px; max-height:400px; font-family:var(--mono); font-size:0.75rem; line-height:1.5; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px; color:var(--text); resize:vertical;"
            x-text="data.prompt || 'No prompt generated'"></textarea>
        </div>
      </template>
    </div>
  </template>

</div>
</body>
</html>
